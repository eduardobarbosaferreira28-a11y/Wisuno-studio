<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wisuno Outro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@700;800;900&family=Inter:wght@400;500;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      width: 2160px;
      height: 3840px;
      background-color: #FFFFFF;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* The exact curve is likely a giant circle or svg. We'll use a large border radius div to perfectly match the peach background */
    .bg-curve {
      position: absolute;
      top: -10%;
      left: 35%; /* Adjusting curve position */
      width: 150%;
      height: 120%;
      background-color: #FDE7D8; /* Light peach */
      border-radius: 40% 0 0 40%;
      z-index: 1;
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-container {
      margin-top: 700px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .logo-mark {
      color: #FF6B00;
      font-size: 160px;
      font-weight: 900;
      font-family: 'Urbanist', sans-serif;
      font-style: italic;
      letter-spacing: -8px;
    }

    .logo-text {
      color: #0A0A0A;
      font-size: 140px;
      font-weight: 800;
      font-family: 'Urbanist', sans-serif;
      font-style: italic;
      letter-spacing: -4px;
    }

    .main-text {
      margin-top: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .heading {
      font-size: 110px;
      font-weight: 700;
      color: #0A0A0A;
      font-family: 'Urbanist', sans-serif;
    }

    .heading .orange {
      color: #FF6B00;
    }

    .line {
      width: 600px;
      height: 6px;
      background-color: #FF6B00;
      margin-top: 50px;
      margin-bottom: 50px;
    }

    .sub-heading {
      font-size: 60px;
      font-weight: 400;
      color: #1A1A1A;
      max-width: 1600px;
      line-height: 1.4;
    }

    .footer {
      position: absolute;
      bottom: 700px;
      width: 100%;
      text-align: center;
      font-size: 45px;
      font-weight: 400;
      color: #1A1A1A;
      padding: 0 100px;
      box-sizing: border-box;
      line-height: 1.5;
    }

    /* Orange logo bars SVG */
    .wisuno-svg {
      width: 250px;
      height: 125px;
    }
  </style>
</head>
<body>
  <div class="bg-curve"></div>
  <div class="content">
    <div class="logo-container">
      <svg class="wisuno-svg" viewBox="0 0 100 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 50 L25 10 L35 10 L20 50 Z" fill="#FF6B00"/>
        <path d="M30 50 L45 10 L55 10 L40 50 Z" fill="#FF6B00"/>
        <path d="M50 50 L65 10 L75 10 L60 50 Z" fill="#FF6B00"/>
      </svg>
      <div class="logo-text">Wisuno</div>
    </div>

    <div class="main-text">
      <div class="heading">Trade with Wisdom. <span class="orange">Trade with Wisuno.</span></div>
      <div class="line"></div>
      <div class="sub-heading">Regulated. Transparent. Trusted.</div>
    </div>

    <div class="footer">
      Regulated by CMA, CySEC, FSA & FSC. Trade responsibly.
    </div>
  </div>
</body>
</html>
