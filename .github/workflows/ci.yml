name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r studio/backend/requirements_studio.txt

      - name: Run tests
        # All external calls (Anthropic/Gemini/HTTP/Supabase) are mocked, so no
        # secrets are required.
        run: pytest -ra
